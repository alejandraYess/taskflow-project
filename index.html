<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="cuerpo" class="bg-[#f0f2f5] font-['Segoe_UI'] m-0 dark:bg-gray-900 transition-colors">

    <header class="bg-[#333] text-white p-4 text-center relative">
        <h1 class="text-xl font-bold">APP TAREAS</h1>
        <button onclick="cambiarTema()" class="absolute right-4 top-4 border border-white px-2 py-1 rounded text-xs">Modo oscuro
        </button>
    </header>

    <div class="contenedor flex flex-col md:flex-row max-w-[1200px] mx-auto my-[20px] gap-[30px] px-[20px] items-start">

        <aside class="barra-iz flex flex-col gap-[12px] w-full md:w-[300px] shrink-0"> 
            <div class="capsula bg-white p-[12px] rounded-[10px] shadow-[0_4px_12px_rgba(0,0,0,0.08)] dark:bg-gray-800">
                <h3 class="mt-0 text-[1rem] border-b border-gray-100 pb-[6px] mb-0 text-primary font-bold">Filtros</h3>
                <ul class="menu list-none p-0 mt-[4px]">
                    <li class="activo bg-primary text-white px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-purple-600 transition-colors">Todas</li>
                    <li class="px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-gray-100 dark:text-white">Pendientes</li>
                    <li class="px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-gray-100 dark:text-white">Completadas</li>
                </ul>
            </div>
            <div class="capsula bg-white p-[12px] rounded-[10px] shadow-[0_4px_12px_rgba(0,0,0,0.08)] dark:bg-gray-800">
                <h3 class="mt-0 text-[1rem] border-b border-gray-100 pb-[6px] mb-0 text-primary font-bold">Categorías</h3>
                <ul class="menu-categorias list-none p-0 mt-[4px]">
                    <li class="categoria-activo bg-primary text-white px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-purple-600 transition-colors">Todas</li>
                    <li class="px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-gray-100 dark:text-white">Casa</li>
                    <li class="px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-gray-100 dark:text-white">Trabajo</li>
                    <li class="px-2 py-1 rounded-[4px] cursor-pointer mt-[3px] hover:bg-gray-100 dark:text-white">Ocio</li>
                </ul>
            </div>
            <div class="capsula bg-white p-[20px] rounded-[15px] shadow-[0_4px_12px_rgba(0,0,0,0.08)] dark:bg-gray-800">
                <h3 class="text-primary font-bold border-b border-gray-100 pb-[10px]">Estadísticas</h3>
                <p class="dark:text-white">Total: <span>0</span></p>
                <p class="dark:text-white">Completadas: <span>0</span></p>
                <p class="dark:text-white">Pendientes: <span>0</span></p>
            </div>
            <button id="btn-borrar-completas" class="mt-4 w-full bg-primary hover:bg-purple-600 text-white py-2 rounded-lg transition-colors font-medium cursor-pointer">
                Borrar completadas
            </button>
        </aside>

        <main class="Tareas flex-1">
            <div class="mb-4">
                <input type="text" id="buscador-input" placeholder="Buscar tarea..." 
                class="w-full p-[10px] rounded-[8px] border border-[#ddd] dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
            </div>
            <section class="entrada mb-6">
                <form id="formulario" class="flex gap-2">
                    <label for="espacio-escribir" class="sr-only">Nueva tarea</label>
                    <input type="text" id="espacio-escribir" placeholder="Escribe tu tarea..." required
                        class="flex-1 p-[10px] rounded-[8px] border border-[#ddd] dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
                    <select id="select-categoria" class="p-[10px] rounded-[8px] border border-[#ddd] dark:bg-gray-700 dark:text-white dark:border-gray-600 outline-none focus:border-primary focus:ring-1 focus:ring-primary">
                        <option value="Casa">Casa</option>
                        <option value="Trabajo">Trabajo</option>
                        <option value="Ocio">Ocio</option>
                    </select>
                    <button type="submit" id="boton-añadir" class="bg-primary hover:bg-purple-600 text-white px-4 py-2 rounded-lg cursor-pointer font-bold transition-colors">añadir</button>
            </section>

            <h2 class="font-bold mb-4 text-primary dark:text-purple-300 text-2xl">Mis Tareas</h2>

            <div class="flex items-center gap-4 mb-4">
                <label for="orden-tareas" class="text-sm font-medium text-gray-700 dark:text-gray-300">Ordenar:</label>
                <select id="orden-tareas" class="p-2 rounded-lg border border-gray-300 dark:bg-gray-700 dark:text-white dark:border-gray-600 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                    <option value="recientes">Más recientes</option>
                    <option value="antiguas">Más antiguas</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>
            </div>
            
            <div id="agregar-tareas" class="flex flex-col gap-[12px]"></div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Esta función guarda la elección 
        function cambiarTema() {
            const cuerpo = document.getElementById('cuerpo');
            cuerpo.classList.toggle('dark')
            
            // guarda en la memoria del navegador
            const modo = cuerpo.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('tema_preferido', modo);
        }

        // al cargar la página, revisa la memoria y pone el modo oscuro si se elige
        if (localStorage.getItem('tema_preferido') === 'dark') {
            document.getElementById('cuerpo').classList.add('dark');
        }
    </script>
</body>
</html>
