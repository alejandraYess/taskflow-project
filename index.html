<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>APP TAREAS</h1>
    </header>

    <div class="contenedor">
        
        <aside class="barra-iz">
            
            <div class="capsula">
                <h3>Filtros</h3>
                <ul class="menu">
                    <li class="activo">Todas</li>
                    <li>Pendientes</li>
                    <li>Completadas</li>
                </ul>
            </div>
        </aside>

        <main class="Tareas">
            <section class="entrada">
                <form id="formulario">
                    <input type="text" id="espacio-escribir" placeholder="Escribe tu tarea..." required>
                    <button type="submit" id="boton-añadir">añadir</button>
                </form>

            </section>
            <h2>Mis Tareas</h2>

            <div id="agregar-tareas"></div>

        </main>
        
    </div>
<script src="app.js"></script>
</body>
</html>
