<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Mis Prácticas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>APP TAREAS</h1>
    </header>

    <div class="contenedor">
        
        <aside class="barra-iz">
            
            <div class="capsula">
                <h3>Filtros</h3>
                <ul class="menu">
                    <li>Todas</li>
                    <li>Pendientes</li>
                    <li>Terminadas</li>
                </ul>
            </div>

            <div class="capsula">
                <h3>Ámbitos</h3>
                <ul class="menu">
                    <li>Casa</li>
                    <li>Trabajo</li>
                    <li>Estudios</li>
                </ul>
            </div>

        </aside>

        <main class="Tareas">
            <h2>Mis Tareas</h2>

            <div class="tarjeta">
                <div class="tarea">
                    <span class="nombre">poner la lavadora</span>
                </div>
                    <span class="prioridad baja">Baja</span>
            </div>
        
            <div class="tarjeta">
                <div class="tarea">
                    <span class="nombre">Terminar el documento</span>
                </div>
                    <span class="prioridad alta">Alta</span>
            </div>
         
            <div class="tarjeta">
                <div class="info">
                    <span class="nombre">Estudiar </span>
                </div>
                    <span class="prioridad alta">Alta</span>
            </div>
           

        </main>
    </div>

</body>
</html>
